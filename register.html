<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container vh-100 d-flex align-items-center">
  <div class="row w-100 justify-content-center">
    
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card p-4 shadow">

        <h3 class="text-center mb-3">Register</h3>

        <form>
          <input type="text" placeholder="Full Name" class="form-control mb-3">

          <input type="email" placeholder="Email" class="form-control mb-3">

          <input type="password" placeholder="Password" class="form-control mb-3">

          <input type="password" placeholder="Confirm Password" class="form-control mb-3">

          <button class="btn btn-primary w-100">Register</button>
        </form>

        <div class="text-center mt-3">
          <a href="index.html">Already have an account? Login</a> |
          <a href="forgot-password.html">Forgot?</a>
        </div>

      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</body>
